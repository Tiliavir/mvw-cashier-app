<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="{{- .Site.Params.author | default "Markus Lindenmann" -}}"/>
<meta name="description" content="{{ .Description }}"/>
<meta name="keywords" content="{{ delimit .Keywords ", " }}"/>
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ .Description }}">
<meta property="og:type" content="website">
<base href="{{ .Site.BaseURL }}">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
{{- if .Params.viewTransitions }}
<script>
  (function () {
    if (sessionStorage.getItem('vt-direction') === 'back') {
      document.documentElement.dataset.direction = 'back';
      sessionStorage.removeItem('vt-direction');
    }
  }());
</script>
{{- end }}
{{- $cssOpts := dict "targetPath" "css/app.css" "outputStyle" "compressed" "enableSourceMap" false -}}
{{- with resources.Get "scss/style.scss" | toCSS $cssOpts | minify -}}
  <style>{{ .Content | safeCSS }}</style>
{{- end }}
