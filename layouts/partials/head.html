<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ .Params.description | default (.Site.Params.description) }}">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ .Params.description | default (.Site.Params.description) }}">
<meta property="og:type" content="website">
<base href="{{ .Site.BaseURL }}">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
{{- if .Params.viewTransitions }}
<script>
  (function () {
    if (sessionStorage.getItem('vt-direction') === 'back') {
      document.documentElement.dataset.direction = 'back';
      sessionStorage.removeItem('vt-direction');
    }
  }());
</script>
{{- end }}
<link rel="stylesheet" href="css/style.css">
